<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Gavezzotti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="stylesheet" href="css/style.css?v=2" />
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--beige-light);
    }
    .err-code {
      font-family: var(--font-serif);
      font-size: clamp(6rem, 20vw, 12rem);
      font-style: italic;
      color: var(--beige-dark);
      line-height: 1;
      margin-bottom: 0;
    }
    .err-title {
      font-family: var(--font-serif);
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-style: italic;
      color: var(--brown);
      margin-bottom: 16px;
    }
    .err-text {
      font-size: 0.95rem;
      color: var(--brown-light);
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .err-logo { height: 110px; margin-bottom: 24px; }
    .err-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(to right, #009246 33%, #fff 33%, #fff 66%, #ce2b37 66%);
      border-radius: 2px;
      margin: 0 auto 28px;
    }
  </style>
</head>
<body>
  <div class="page-404">
    <img src="images/title%20Black.png" alt="Gavezzotti" class="err-logo" />
    <p class="err-code">404</p>
    <div class="err-divider"></div>
    <h1 class="err-title">Cette page n'existe pas…</h1>
    <p class="err-text">On dirait que vous avez commandé un plat qui n'est pas à la carte ! Retournez à l'accueil pour découvrir ce qu'on vous propose vraiment.</p>
    <a href="index.html" class="btn-cta">← Retour à l'accueil</a>
  </div>
</body>
</html>
